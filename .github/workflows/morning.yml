name: Morning calculation

on:
  schedule:
    - cron: '59 20 * * *'
  workflow_dispatch:

jobs:
  run-python:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run Python
        run: python main.py

      - name: Save result
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add morning.json
          git commit -m "update morning result" || exit 0
          git push
