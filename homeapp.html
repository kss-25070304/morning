<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>朝の交通ナビ</title>
  <link rel="stylesheet" href="CSS/homeapp.css">

  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCS0WD_E4VRmGvGxAdmcecagjXRE4UKIBg&language=ja"></script>

  </head>
<body>
  <!-- 画面5：ホーム -->
  <div class="screen" id="screen-home">
    <div class="top-area">
      <div class="name-label" id="nickname"></div>
      <div class="departure-label">明日のおすすめ出発時間</div>
      <div class="date-text" id="home-date">--</div>
      <div class="departure-time" id="home-departure">--:--</div>
    </div>
      <div class="info-card">
        <div class="info-title">明日の天気</div>
        <div class="info-content" id="home-weather"><span class="placeholder">読み込み中...</span></div>
        <div class="memo-label" id="time-memo">読み込み中...</div>
        <div class="message"><br>今日も安全運転で、<br><font size="6">いってらっしゃい！</font></div>
        <button class = "clearbutton" id="clear">
          登録内容の変更
        </button>
      </div>
    </div>

    <script src="javascript/homeapp.js">
    </script>
  </body>
</html>
