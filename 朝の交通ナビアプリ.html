<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>朝の交通ナビ</title>
  <link rel="stylesheet" href="CSS/朝の交通ナビアプリ 1.css">
  <link rel="manifest" href="main.json">
  <meta name="theme-color" content="#0b4cc9">
 
  </head>
<body>
 
    <div class="container">
 
    </div>
 
  <!-- 画面1：スプラッシュ -->
  <div class="screen" id="screen-splash">
    <div class="splash-content">
      <div class="splash-sub">あなたに贈る、</div>
      <div class="splash-title">朝の<br>最適な出発時間</div>
      <div class="tap-text">タップして開始</div>
    </div>
  </div>
 
  <!-- 画面2：個人設定登録 -->
  <div class="screen" id="screen-register">
    <div class="form-container">
      <div class="form-title">個人設定登録</div>
 
      <div class="form-group">
        <label>1.ニックネーム</label>
        <input type="text" id="nickname" placeholder="">
        <div class="error-msg" id="err-nickname">ニックネームを入力してください</div>
      </div>
     <!--- <div class="form-group">
        <label>出発地点（自宅の住所）</label>
        <input type="text" id="origin" placeholder="">
        <div class="error-msg" id="err-origin">出発地点を入力してください</div>
      </div>
      <div class="form-group">
        <label>通勤先(名称 or 住所)</label>
        <input type="text" id="destination" placeholder="例：新潟駅">
        <div class="error-msg" id="err-destination">通勤先を入力してください</div>
      </div>
    -->
 
    <div class="check-label">
        <label>2.利用する道路を選択してください。</label>
        <label><input type="checkbox" value="黒崎"> 黒崎IC周辺</label>
        <label><input type="checkbox" value="女池"> 女池IC周辺</label>
        <label><input type="checkbox" value="桜木"> 桜木IC周辺</label>
        <label><input type="checkbox" value="弁天"> 弁天IC周辺</label>
        <label><input type="checkbox" value="紫竹山"> 紫竹山IC周辺</label>
        <label><input type="checkbox" value="姥ヶ山"> 姥ヶ山IC周辺</label>
        <label><input type="checkbox" value="栗ノ木バイパス"> 栗ノ木バイパス周辺</label>
        <label><input type="checkbox" value="竹尾"> 竹尾IC周辺</label>
        <label><input type="checkbox" value="逢谷内"> 逢谷内IC周辺</label>
        <label><input type="checkbox" value="海老ケ瀬"> 海老ケ瀬IC周辺</label><br><br>
    </div>
   
      <!-- 出発・到着・通知：時計ピッカーで選択 -->
      <div class="form-group">
        <label>3.普段の出発時間</label>
        <button type="button" class="time-field-btn" id="btn-depart">
          <span class="tf-icon">⌚</span>
          <span class="tf-val tf-placeholder">時間を選択</span>
        </button>
        <input type="hidden" id="departTime">
        <div class="error-msg" id="err-departTime">出発時間を設定してください</div>
      </div>
     <!-- <div class="form-group">
        <label>普段の到着時間</label>
        <button type="button" class="time-field-btn" id="btn-arrival">
          <span class="tf-icon">🕑</span>
          <span class="tf-val tf-placeholder">時間を選択</span>
        </button>
        <input type="hidden" id="arrivalTime">
        <div class="error-msg" id="err-arrivalTime">到着時間を設定してください</div>
      </div>-->
      <div class="form-group">
        <label>4.通知時刻</label>
        <button type="button" class="time-field-btn" id="btn-notify">
          <span class="tf-icon">🔔</span>
          <span class="tf-val tf-placeholder">時間を選択</span>
        </button>
        <input type="hidden" id="notifyTime">
        <div class="error-msg" id="err-notifyTime">通知時刻を設定してください</div>
      </div>
      <button class="save-button" id="btn-register" disabled>登録</button>
    </div>
  </div>

 
<!-- 画面4：登録完了 -->
  <div class="screen" id="screen-complete" onclick="location.href='home.html'">
    <div class="complete-container">
      <div class="check-icon">✅</div>
      <div class="complete-title">登録完了</div>
      <div class="complete-message">
        毎朝最適な出発時間を<br>ご提供いたします
      </div>
      <div class="tap-text" onclick="location.href='home.html'">>タップして次へ</div>
    </div>
  </div>
 
  
 
  <!-- 時計ピッカー モーダル（3項目共通） -->
  <div class="clock-overlay" id="clock-overlay">
    <div class="clock-modal">
      <div class="clock-modal-title" id="clock-title">時間を選択</div>
      <div class="clock-digital">
        <div class="clock-seg" id="seg-hour">07</div>
        <div class="clock-colon">:</div>
        <div class="clock-seg" id="seg-min">00</div>
      </div>
      <div class="clock-face-wrap">
        <div class="clock-face" id="clock-face"></div>
      </div>
      <div class="clock-actions">
        <button class="clock-btn clock-btn-cancel" id="clock-cancel">キャンセル</button>
        <button class="clock-btn clock-btn-ok"     id="clock-ok">決定</button>
      </div>
    </div>
  </div>
 
    <script src="javascript/朝の交通ナビアプリ 1.js">
    </script>
  </body>
</html>
